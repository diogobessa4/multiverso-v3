<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Multiverso</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#080c14;--bg2:#0d1424;--card:#111827;--border:#1e3a5f;--neon:#00d4ff;--neon2:#ff3e6c;--neon3:#a855f7;--gold:#fbbf24;--text:#e2e8f0;--muted:#64748b;--success:#22c55e;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;}

    /* LOGIN */
    .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:radial-gradient(ellipse at center,#0d1424 0%,#080c14 100%);}
    .login-box{background:var(--bg2);border:1px solid var(--neon3);padding:3rem;width:100%;max-width:400px;text-align:center;box-shadow:0 0 80px rgba(168,85,247,.2);}
    .login-logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.8rem;color:var(--neon);text-shadow:0 0 25px var(--neon);letter-spacing:2px;margin-bottom:.25rem;}
    .login-logo span{color:var(--neon2);}
    .login-sub{color:var(--muted);font-size:.75rem;margin-bottom:2rem;letter-spacing:3px;text-transform:uppercase;}

    /* LAYOUT */
    .layout{display:none;min-height:100vh;}
    .layout.show{display:flex;}
    .sidebar{width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
    .sidebar-logo{padding:1.5rem;border-bottom:1px solid var(--border);}
    .sidebar-logo .logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.1rem;color:var(--neon);text-shadow:0 0 15px var(--neon);}
    .sidebar-logo .logo span{color:var(--neon2);}
    .sidebar-logo .badge{font-size:.62rem;color:var(--neon3);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
    .nav-item{display:flex;align-items:center;gap:.75rem;padding:1rem 1.5rem;cursor:pointer;color:var(--muted);font-size:.85rem;border-left:3px solid transparent;transition:all .2s;user-select:none;}
    .nav-item:hover{color:var(--text);background:rgba(0,212,255,.04);}
    .nav-item.active{color:var(--neon);border-left-color:var(--neon);background:rgba(0,212,255,.07);}
    .nav-icon{font-size:1.1rem;}
    .sidebar-footer{margin-top:auto;padding:1rem 1.5rem;border-top:1px solid var(--border);}
    .btn-logout{width:100%;background:none;border:1px solid var(--border);color:var(--muted);font-family:'Exo 2',sans-serif;font-size:.8rem;padding:9px;cursor:pointer;transition:all .2s;}
    .btn-logout:hover{border-color:var(--neon2);color:var(--neon2);}
    .main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
    .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .topbar-title{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;color:#fff;}
    .topbar-sub{font-size:.78rem;color:var(--muted);}
    .content{padding:2rem;flex:1;}

    /* TABS */
    .tab{display:none;}
    .tab.active{display:block;}

    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem;}
    .stat{background:var(--card);border:1px solid var(--border);padding:1.5rem;position:relative;overflow:hidden;}
    .stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
    .stat.blue::after{background:var(--neon);}
    .stat.green::after{background:var(--success);}
    .stat.yellow::after{background:var(--gold);}
    .stat.red::after{background:var(--neon2);}
    .stat.purple::after{background:var(--neon3);}
    .stat-icon{font-size:1.5rem;margin-bottom:.75rem;}
    .stat-val{font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;color:#fff;}
    .stat-lbl{font-size:.72rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:.25rem;}

    /* CARDS / TABLES */
    .card{background:var(--card);border:1px solid var(--border);overflow:hidden;margin-bottom:1.5rem;}
    .card-hd{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
    .card-title{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;color:#fff;}
    table{width:100%;border-collapse:collapse;}
    th{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--neon);text-align:left;padding:10px 16px;background:rgba(0,212,255,.03);border-bottom:1px solid var(--border);}
    td{padding:12px 16px;border-bottom:1px solid rgba(30,58,95,.4);font-size:.84rem;vertical-align:middle;}
    tr:hover td{background:rgba(0,212,255,.02);}
    tr:last-child td{border-bottom:none;}

    /* STATUS */
    .sb{font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;}
    .sp{background:rgba(251,191,36,.15);color:var(--gold);border:1px solid rgba(251,191,36,.3);}
    .sc{background:rgba(34,197,94,.15);color:var(--success);border:1px solid rgba(34,197,94,.3);}
    .sx{background:rgba(255,62,108,.15);color:var(--neon2);border:1px solid rgba(255,62,108,.3);}
    .sd{background:rgba(168,85,247,.15);color:var(--neon3);border:1px solid rgba(168,85,247,.3);}

    /* FILTERS */
    .filters{display:flex;gap:.6rem;flex-wrap:wrap;}
    .fbtn{background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;cursor:pointer;transition:all .2s;}
    .fbtn:hover{border-color:var(--neon);color:var(--neon);}
    .fbtn.active{background:rgba(0,212,255,.1);border-color:var(--neon);color:var(--neon);}

    /* FORMS */
    .fg{margin-bottom:1.25rem;}
    .fl{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--neon);margin-bottom:.5rem;font-family:'Orbitron',monospace;}
    .fi,.fs,.ft{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Exo 2',sans-serif;font-size:.9rem;padding:11px 14px;outline:none;transition:border-color .2s;}
    .fi:focus,.fs:focus,.ft:focus{border-color:var(--neon3);}
    .fs option{background:var(--bg2);}
    .ft{resize:vertical;min-height:70px;}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .btn{font-family:'Orbitron',monospace;font-weight:700;font-size:.7rem;letter-spacing:1px;text-transform:uppercase;padding:10px 20px;border:none;cursor:pointer;transition:all .2s;}
    .btn-neon{background:var(--neon);color:#000;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
    .btn-neon:hover{background:#fff;box-shadow:0 0 20px var(--neon);}
    .btn-purple{background:var(--neon3);color:#fff;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
    .btn-purple:hover{background:#c084fc;box-shadow:0 0 20px var(--neon3);}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
    .btn-ghost:hover{border-color:var(--neon);color:var(--neon);}
    .btn-danger{background:transparent;color:var(--neon2);border:1px solid var(--neon2);padding:6px 12px;font-size:.6rem;}
    .btn-danger:hover{background:var(--neon2);color:#fff;}
    .btn-sm{padding:6px 12px;font-size:.62rem;}

    /* MODAL */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:3000;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px);}
    .overlay.open{display:flex;}
    .modal{background:var(--bg2);border:1px solid var(--neon);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:mIn .3s ease;}
    @keyframes mIn{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
    .modal-hd{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .modal-title{font-family:'Orbitron',monospace;font-size:.9rem;font-weight:900;color:var(--neon);}
    .modal-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;}
    .modal-close:hover{color:var(--neon2);}
    .modal-bd{padding:1.5rem;}

    .loader{text-align:center;padding:3rem;color:var(--muted);}
    .spin{display:inline-block;width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--neon);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:.75rem;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty{text-align:center;padding:3rem;color:var(--muted);}
    .err{color:var(--neon2);font-size:.8rem;margin-top:.5rem;}
    .ok{color:var(--success);font-size:.8rem;margin-top:.5rem;}
    .badge-hot{background:var(--gold);color:#000;font-size:.6rem;padding:2px 8px;font-family:'Orbitron',monospace;font-weight:700;}
    .badge-new{background:var(--neon2);color:#fff;font-size:.6rem;padding:2px 8px;font-family:'Orbitron',monospace;font-weight:700;}
    .badge-limited{background:var(--neon3);color:#fff;font-size:.6rem;padding:2px 8px;font-family:'Orbitron',monospace;font-weight:700;}
    .stock-ok{color:var(--success);}
    .stock-low{color:var(--gold);}
    .stock-zero{color:var(--neon2);}
    @media(max-width:768px){.sidebar{display:none;}.fgrid{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">MULTI<span>VERSO</span></div>
    <div class="login-sub">// Painel Administrativo</div>
    <div class="fg"><label class="fl">Senha</label><input type="password" class="fi" id="loginSenha" placeholder="Digite a senha..." onkeydown="if(event.key==='Enter')fazerLogin()"/></div>
    <div id="loginErr" class="err"></div>
    <button class="btn btn-neon" style="width:100%;margin-top:.5rem;padding:14px" onclick="fazerLogin()">ENTRAR</button>
  </div>
</div>

<!-- ADMIN LAYOUT -->
<div class="layout" id="adminLayout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo">MULTI<span>VERSO</span></div><div class="badge">// Admin Panel</div></div>
    <nav style="flex:1">
      <div class="nav-item active" onclick="irPara('dashboard',this)"><span class="nav-icon">📊</span>Dashboard</div>
      <div class="nav-item" onclick="irPara('reservas',this)"><span class="nav-icon">📋</span>Reservas</div>
      <div class="nav-item" onclick="irPara('produtos',this)"><span class="nav-icon">📦</span>Produtos</div>
      <div class="nav-item" onclick="irPara('novo',this)"><span class="nav-icon">➕</span>Novo Produto</div>
    </nav>
    <div class="sidebar-footer">
      <a href="../index.html" style="display:block;text-align:center;color:var(--muted);font-size:.75rem;margin-bottom:.75rem;text-decoration:none;">← Ver Loja</a>
      <button class="btn-logout" onclick="logout()">SAIR</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title" id="tTitle">Dashboard</div><div class="topbar-sub" id="tSub">Visão geral da loja</div></div>
      <button class="btn btn-ghost btn-sm" onclick="recarregar()">↻ Atualizar</button>
    </div>
    <div class="content">

      <!-- DASHBOARD -->
      <div class="tab active" id="tab-dashboard">
        <div class="stats" id="statsGrid"><div class="loader"><div class="spin"></div></div></div>
        <div class="card">
          <div class="card-hd"><div class="card-title">⚡ Reservas Recentes</div></div>
          <div style="overflow-x:auto"><table id="tRecentes"><tr><td class="loader" colspan="5">Carregando...</td></tr></table></div>
        </div>
      </div>

      <!-- RESERVAS -->
      <div class="tab" id="tab-reservas">
        <div class="card">
          <div class="card-hd">
            <div class="card-title">Todas as Reservas</div>
            <div class="filters">
              <button class="fbtn active" onclick="filtrarRes('',this)">Todas</button>
              <button class="fbtn" onclick="filtrarRes('pending',this)">Aguardando</button>
              <button class="fbtn" onclick="filtrarRes('confirmed',this)">Confirmadas</button>
              <button class="fbtn" onclick="filtrarRes('completed',this)">Retiradas</button>
              <button class="fbtn" onclick="filtrarRes('cancelled',this)">Canceladas</button>
            </div>
          </div>
          <div style="overflow-x:auto" id="reservasWrap"><div class="loader"><div class="spin"></div></div></div>
        </div>
      </div>

      <!-- PRODUTOS -->
      <div class="tab" id="tab-produtos">
        <div class="card">
          <div class="card-hd"><div class="card-title">Gerenciar Produtos</div></div>
          <div style="overflow-x:auto" id="produtosWrap"><div class="loader"><div class="spin"></div></div></div>
        </div>
      </div>

      <!-- NOVO PRODUTO -->
      <div class="tab" id="tab-novo">
        <div class="card">
          <div class="card-hd"><div class="card-title">➕ Cadastrar Novo Produto</div></div>
          <div style="padding:1.5rem;max-width:580px">
            <div class="fg"><label class="fl">Nome *</label><input type="text" class="fi" id="npNome" placeholder="Ex: Spider-Man: No Way Home"/></div>
            <div class="fg"><label class="fl">Descrição</label><textarea class="ft" id="npDesc" placeholder="Descreva o produto..."></textarea></div>
            <div class="fgrid">
              <div class="fg"><label class="fl">Categoria *</label>
                <select class="fs" id="npCat"><option value="hq">HQ / Quadrinhos</option><option value="manga">Mangá</option><option value="funko">Funko Pop!</option><option value="card">Cards / TCG</option><option value="acessorio">Acessório</option></select>
              </div>
              <div class="fg"><label class="fl">Badge</label>
                <select class="fs" id="npBadge"><option value="">Nenhum</option><option value="new">Novo</option><option value="hot">🔥 Hot</option><option value="limited">⭐ Limitado</option></select>
              </div>
            </div>
            <div class="fgrid">
              <div class="fg"><label class="fl">Preço (R$) *</label><input type="number" class="fi" id="npPreco" placeholder="0.00" step="0.01" min="0"/></div>
              <div class="fg"><label class="fl">Estoque *</label><input type="number" class="fi" id="npEstoque" placeholder="1" min="0" value="1"/></div>
            </div>
            <div class="fg"><label class="fl">Emoji do Produto</label><input type="text" class="fi" id="npEmoji" value="📦" style="width:80px;font-size:1.4rem"/></div>
            <div id="npErr" class="err"></div><div id="npOk" class="ok"></div>
            <button class="btn btn-purple" style="padding:14px 32px" onclick="criarProduto()">⚡ CADASTRAR PRODUTO</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL EDITAR PRODUTO -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-hd"><div class="modal-title">EDITAR PRODUTO</div><button class="modal-close" onclick="fecharEdit()">✕</button></div>
    <div class="modal-bd">
      <input type="hidden" id="epId"/>
      <div class="fg"><label class="fl">Nome *</label><input type="text" class="fi" id="epNome"/></div>
      <div class="fg"><label class="fl">Descrição</label><textarea class="ft" id="epDesc"></textarea></div>
      <div class="fgrid">
        <div class="fg"><label class="fl">Categoria</label><select class="fs" id="epCat"><option value="hq">HQ / Quadrinhos</option><option value="manga">Mangá</option><option value="funko">Funko Pop!</option><option value="card">Cards / TCG</option><option value="acessorio">Acessório</option></select></div>
        <div class="fg"><label class="fl">Badge</label><select class="fs" id="epBadge"><option value="">Nenhum</option><option value="new">Novo</option><option value="hot">🔥 Hot</option><option value="limited">⭐ Limitado</option></select></div>
      </div>
      <div class="fgrid">
        <div class="fg"><label class="fl">Preço (R$)</label><input type="number" class="fi" id="epPreco" step="0.01"/></div>
        <div class="fg"><label class="fl">Estoque</label><input type="number" class="fi" id="epEstoque" min="0"/></div>
      </div>
      <div class="fg"><label class="fl">Emoji</label><input type="text" class="fi" id="epEmoji" style="width:80px;font-size:1.4rem"/></div>
      <div id="epErr" class="err"></div>
      <button class="btn btn-neon" style="width:100%;padding:14px;margin-top:.5rem" onclick="salvarEdit()">SALVAR ALTERAÇÕES</button>
    </div>
  </div>
</div>

<!-- MODAL STATUS -->
<div class="overlay" id="statusOverlay">
  <div class="modal" style="max-width:360px">
    <div class="modal-hd"><div class="modal-title">ALTERAR STATUS</div><button class="modal-close" onclick="fecharStatus()">✕</button></div>
    <div class="modal-bd">
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:1.25rem">Reserva: <span id="sCodigo" style="color:var(--gold);font-family:'Orbitron',monospace;font-weight:700"></span></p>
      <div class="fg"><label class="fl">Novo Status</label>
        <select class="fs" id="sSelect"><option value="pending">Aguardando</option><option value="confirmed">Confirmado</option><option value="completed">Retirado</option><option value="cancelled">Cancelado</option></select>
      </div>
      <div id="sErr" class="err"></div>
      <button class="btn btn-neon" style="width:100%;padding:14px" onclick="confirmarStatus()">CONFIRMAR</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import {
    getFirestore, collection, doc, addDoc, getDocs, getDoc,
    updateDoc, deleteDoc, query, where, orderBy, serverTimestamp, runTransaction
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCO3FVw7ydaqr0_2N9AlB9rYj9UTkXtlGQ",
    authDomain: "multiverso-banca.firebaseapp.com",
    projectId: "multiverso-banca",
    storageBucket: "multiverso-banca.firebasestorage.app",
    messagingSenderId: "15821286059",
    appId: "1:15821286059:web:385ffd2162ad55e005e5ee",
    measurementId: "G-P197Z8H2N1"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── SENHA ADMIN (simples, sem servidor) ──────────────────────────────────
  const ADMIN_PASS = 'multiverso2025';
  let logado = false;
  let abaAtual = 'dashboard';
  let statusReservaId = '';
  let filtroStatusAtual = '';

  function fmtPreco(v){ return 'R$ '+Number(v).toFixed(2).replace('.',','); }
  function statusHtml(s){
    const cls={pending:'sp',confirmed:'sc',cancelled:'sx',completed:'sd'}[s]||'sp';
    const lbl={pending:'Aguardando',confirmed:'Confirmado',cancelled:'Cancelado',completed:'Retirado'}[s]||s;
    return `<span class="sb ${cls}">${lbl}</span>`;
  }
  function badgeHtml(b){
    if(!b)return'';
    const cls={hot:'badge-hot',new:'badge-new',limited:'badge-limited'}[b]||'';
    const lbl={hot:'Hot',new:'Novo',limited:'Limitado'}[b]||b;
    return `<span class="${cls}">${lbl}</span>`;
  }
  function stockCls(n){ return n===0?'stock-zero':n<=2?'stock-low':'stock-ok'; }

  // ── AUTH ─────────────────────────────────────────────────────────────────
  window.fazerLogin = function() {
    const s = document.getElementById('loginSenha').value;
    if (s === ADMIN_PASS) {
      logado = true;
      sessionStorage.setItem('mvs_admin','1');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminLayout').classList.add('show');
      carregarDashboard();
    } else {
      document.getElementById('loginErr').textContent = 'Senha incorreta.';
    }
  };

  window.logout = function() {
    sessionStorage.removeItem('mvs_admin');
    logado = false;
    document.getElementById('adminLayout').classList.remove('show');
    document.getElementById('loginScreen').style.display = 'flex';
  };

  if (sessionStorage.getItem('mvs_admin')) {
    logado = true;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminLayout').classList.add('show');
    carregarDashboard();
  }

  // ── NAVEGAÇÃO ────────────────────────────────────────────────────────────
  const tabTitles = { dashboard:'Dashboard', reservas:'Reservas', produtos:'Produtos', novo:'Novo Produto' };
  const tabSubs   = { dashboard:'Visão geral', reservas:'Gerenciar reservas', produtos:'Gerenciar catálogo', novo:'Adicionar produto' };

  window.irPara = function(aba, el) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if (el) el.classList.add('active');
    document.getElementById('tab-'+aba).classList.add('active');
    document.getElementById('tTitle').textContent = tabTitles[aba] || aba;
    document.getElementById('tSub').textContent   = tabSubs[aba]   || '';
    abaAtual = aba;
    if (aba === 'dashboard') carregarDashboard();
    if (aba === 'reservas')  carregarReservas();
    if (aba === 'produtos')  carregarProdutos();
  };

  window.recarregar = function() { window.irPara(abaAtual, null); };

  // ── DASHBOARD ────────────────────────────────────────────────────────────
  async function carregarDashboard() {
    try {
      const [resSnap, prodSnap] = await Promise.all([
        getDocs(collection(db,'reservas')),
        getDocs(query(collection(db,'produtos'), where('ativo','==',true)))
      ]);
      const reservas = resSnap.docs.map(d => ({ id:d.id, ...d.data() }));
      const total    = reservas.length;
      const pending  = reservas.filter(r => r.status==='pending').length;
      const confirmed= reservas.filter(r => r.status==='confirmed').length;
      const cancelled= reservas.filter(r => r.status==='cancelled').length;
      const produtos = prodSnap.docs.map(d => d.data());
      const baixo    = produtos.filter(p => p.estoque <= 2).length;

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat blue"><div class="stat-icon">📋</div><div class="stat-val">${total}</div><div class="stat-lbl">Total Reservas</div></div>
        <div class="stat yellow"><div class="stat-icon">⏳</div><div class="stat-val">${pending}</div><div class="stat-lbl">Aguardando</div></div>
        <div class="stat green"><div class="stat-icon">✅</div><div class="stat-val">${confirmed}</div><div class="stat-lbl">Confirmadas</div></div>
        <div class="stat red"><div class="stat-icon">❌</div><div class="stat-val">${cancelled}</div><div class="stat-lbl">Canceladas</div></div>
        <div class="stat purple"><div class="stat-icon">📦</div><div class="stat-val">${produtos.length}</div><div class="stat-lbl">Produtos</div></div>
        <div class="stat yellow"><div class="stat-icon">⚠️</div><div class="stat-val">${baixo}</div><div class="stat-lbl">Estoque Baixo</div></div>
      `;

      const recentes = reservas
        .sort((a,b) => (b.criadoEm?.seconds||0)-(a.criadoEm?.seconds||0))
        .slice(0,6);

      document.getElementById('tRecentes').innerHTML = `
        <thead><tr><th>Código</th><th>Produto</th><th>Cliente</th><th>Status</th><th>Data</th></tr></thead>
        <tbody>${recentes.map(r=>`<tr>
          <td><span style="font-family:'Orbitron',monospace;color:var(--gold);font-size:.75rem">${r.codigo}</span></td>
          <td>${r.produtoEmoji} ${r.produtoNome}</td>
          <td>${r.nome}</td>
          <td>${statusHtml(r.status)}</td>
          <td style="font-size:.75rem;color:var(--muted)">${r.criadoEm?.toDate?.()?.toLocaleDateString('pt-BR')||'—'}</td>
        </tr>`).join('')||'<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--muted)">Nenhuma reserva ainda.</td></tr>'}</tbody>
      `;
    } catch(e) { console.error(e); }
  }

  // ── RESERVAS ─────────────────────────────────────────────────────────────
  async function carregarReservas(filtro='') {
    filtroStatusAtual = filtro;
    const wrap = document.getElementById('reservasWrap');
    wrap.innerHTML = '<div class="loader"><div class="spin"></div></div>';
    try {
      let q = query(collection(db,'reservas'), orderBy('criadoEm','desc'));
      const snap = await getDocs(q);
      let lista = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      if (filtro) lista = lista.filter(r => r.status === filtro);
      if (!lista.length) { wrap.innerHTML='<div class="empty">📭 Nenhuma reserva encontrada.</div>'; return; }
      wrap.innerHTML = `<table>
        <thead><tr><th>Código</th><th>Produto</th><th>Cliente</th><th>WhatsApp</th><th>Retirada</th><th>Qtd</th><th>Status</th><th>Ação</th></tr></thead>
        <tbody>${lista.map(r=>`<tr>
          <td><span style="font-family:'Orbitron',monospace;color:var(--gold);font-size:.75rem">${r.codigo}</span></td>
          <td>${r.produtoEmoji} ${r.produtoNome}</td>
          <td>${r.nome}</td>
          <td style="font-size:.8rem;color:var(--muted)">${r.tel}</td>
          <td style="font-size:.8rem">${r.dataRetirada?new Date(r.dataRetirada+'T12:00').toLocaleDateString('pt-BR'):'—'}</td>
          <td>${r.quantidade}x</td>
          <td>${statusHtml(r.status)}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="abrirStatus('${r.id}','${r.status}','${r.codigo}')">✏️ Status</button></td>
        </tr>`).join('')}</tbody>
      </table>`;
    } catch(e) { wrap.innerHTML='<div class="empty">⚠️ Erro ao carregar.</div>'; }
  }

  window.filtrarRes = function(s, el) {
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    carregarReservas(s);
  };

  window.abrirStatus = function(id, status, codigo) {
    statusReservaId = id;
    document.getElementById('sCodigo').textContent = codigo;
    document.getElementById('sSelect').value = status;
    document.getElementById('sErr').textContent = '';
    document.getElementById('statusOverlay').classList.add('open');
  };
  window.fecharStatus = function() { document.getElementById('statusOverlay').classList.remove('open'); };

  window.confirmarStatus = async function() {
    const novoStatus = document.getElementById('sSelect').value;
    try {
      const resRef = doc(db,'reservas',statusReservaId);
      const resSnap = await getDoc(resRef);
      const resData = resSnap.data();

      // Se cancelando, devolver estoque
      if (novoStatus === 'cancelled' && resData.status !== 'cancelled') {
        await runTransaction(db, async tx => {
          const prodRef  = doc(db,'produtos',resData.produtoId);
          const prodSnap = await tx.get(prodRef);
          tx.update(resRef,  { status: novoStatus });
          tx.update(prodRef, { estoque: (prodSnap.data().estoque||0) + resData.quantidade });
        });
      } else {
        await updateDoc(resRef, { status: novoStatus });
      }
      fecharStatus();
      carregarReservas(filtroStatusAtual);
    } catch(e) { document.getElementById('sErr').textContent = 'Erro ao atualizar.'; }
  };

  // ── PRODUTOS ─────────────────────────────────────────────────────────────
  async function carregarProdutos() {
    const wrap = document.getElementById('produtosWrap');
    wrap.innerHTML = '<div class="loader"><div class="spin"></div></div>';
    try {
      const snap = await getDocs(query(collection(db,'produtos'), where('ativo','==',true)));
      const lista = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      if (!lista.length) { wrap.innerHTML='<div class="empty">📭 Nenhum produto cadastrado.</div>'; return; }
      wrap.innerHTML = `<table>
        <thead><tr><th>Produto</th><th>Categoria</th><th>Preço</th><th>Estoque</th><th>Badge</th><th>Ações</th></tr></thead>
        <tbody>${lista.map(p=>`<tr>
          <td>${p.emoji} <strong>${p.nome}</strong></td>
          <td style="font-size:.8rem;color:var(--muted)">${p.categoria}</td>
          <td style="font-family:'Orbitron',monospace;color:var(--gold)">${fmtPreco(p.preco)}</td>
          <td class="${stockCls(p.estoque)}" style="font-family:'Orbitron',monospace;font-weight:700">${p.estoque}</td>
          <td>${badgeHtml(p.badge)}</td>
          <td style="display:flex;gap:.5rem;flex-wrap:wrap">
            <button class="btn btn-ghost btn-sm" onclick='abrirEdit(${JSON.stringify({id:p.id,nome:p.nome,descricao:p.descricao,categoria:p.categoria,badge:p.badge||"",preco:p.preco,estoque:p.estoque,emoji:p.emoji}).replace(/'/g,"&#39;")})'>✏️ Editar</button>
            <button class="btn btn-danger btn-sm" onclick="desativar('${p.id}','${p.nome}')">🗑️</button>
          </td>
        </tr>`).join('')}</tbody>
      </table>`;
    } catch(e) { wrap.innerHTML='<div class="empty">⚠️ Erro ao carregar.</div>'; }
  }

  window.abrirEdit = function(p) {
    const prod = typeof p === 'string' ? JSON.parse(p) : p;
    document.getElementById('epId').value      = prod.id;
    document.getElementById('epNome').value    = prod.nome;
    document.getElementById('epDesc').value    = prod.descricao||'';
    document.getElementById('epCat').value     = prod.categoria;
    document.getElementById('epBadge').value   = prod.badge||'';
    document.getElementById('epPreco').value   = prod.preco;
    document.getElementById('epEstoque').value = prod.estoque;
    document.getElementById('epEmoji').value   = prod.emoji||'📦';
    document.getElementById('epErr').textContent = '';
    document.getElementById('editOverlay').classList.add('open');
  };
  window.fecharEdit = function() { document.getElementById('editOverlay').classList.remove('open'); };

  window.salvarEdit = async function() {
    const id = document.getElementById('epId').value;
    const dados = {
      nome: document.getElementById('epNome').value,
      descricao: document.getElementById('epDesc').value,
      categoria: document.getElementById('epCat').value,
      badge: document.getElementById('epBadge').value || null,
      preco: parseFloat(document.getElementById('epPreco').value),
      estoque: parseInt(document.getElementById('epEstoque').value),
      emoji: document.getElementById('epEmoji').value || '📦',
    };
    try {
      await updateDoc(doc(db,'produtos',id), dados);
      fecharEdit();
      carregarProdutos();
    } catch(e) { document.getElementById('epErr').textContent = 'Erro ao salvar.'; }
  };

  window.desativar = async function(id, nome) {
    if (!confirm(`Desativar "${nome}"?`)) return;
    await updateDoc(doc(db,'produtos',id), { ativo: false });
    carregarProdutos();
  };

  // ── CRIAR PRODUTO ────────────────────────────────────────────────────────
  window.criarProduto = async function() {
    const nome    = document.getElementById('npNome').value.trim();
    const preco   = parseFloat(document.getElementById('npPreco').value);
    const estoque = parseInt(document.getElementById('npEstoque').value);
    document.getElementById('npErr').textContent = '';
    document.getElementById('npOk').textContent  = '';
    if (!nome || isNaN(preco) || isNaN(estoque)) {
      document.getElementById('npErr').textContent = 'Preencha nome, preço e estoque.'; return;
    }
    try {
      await addDoc(collection(db,'produtos'), {
        nome, descricao: document.getElementById('npDesc').value,
        categoria: document.getElementById('npCat').value,
        badge: document.getElementById('npBadge').value || null,
        preco, estoque,
        emoji: document.getElementById('npEmoji').value || '📦',
        ativo: true,
        criadoEm: serverTimestamp()
      });
      document.getElementById('npOk').textContent  = `✅ Produto "${nome}" cadastrado!`;
      document.getElementById('npNome').value = '';
      document.getElementById('npDesc').value = '';
      document.getElementById('npPreco').value = '';
      document.getElementById('npEstoque').value = '1';
      document.getElementById('npEmoji').value = '📦';
      document.getElementById('npBadge').value = '';
    } catch(e) { document.getElementById('npErr').textContent = 'Erro ao cadastrar.'; }
  };

  // Fechar overlays clicando fora
  ['editOverlay','statusOverlay'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
      if (e.target.id === id) document.getElementById(id).classList.remove('open');
    });
  });
</script>
</body>
</html>
